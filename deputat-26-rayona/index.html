<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Депутат 26 Района</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --accent:  #8b5cf6;
    --accent2: #a78bfa;
    --bg:      #0a0a0f;
    --sidebar: #111118;
    --card:    #1a1a28;
    --hover:   #22223a;
    --border:  rgba(255,255,255,.06);
    --text:    #fff;
    --muted:   #6b6b8a;
    --bar-h:   90px;
}

html, body { height: 100%; }

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
}

/* ════════════════════════════
   LAYOUT
════════════════════════════ */
.layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 8px;
    padding: 8px 8px 0;
    min-height: 0;
}

/* ════════════════════════════
   SIDEBAR
════════════════════════════ */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--sidebar);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-top {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.sidebar-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
}

.sidebar-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
}

.sidebar-count {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
}

.track-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
}

.track-list::-webkit-scrollbar { width: 3px; }
.track-list::-webkit-scrollbar-track { background: transparent; }
.track-list::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

.track-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    position: relative;
}

.track-row:hover { background: var(--hover); }
.track-row.active { background: rgba(139,92,246,.12); }

.track-num {
    font-size: 13px;
    color: var(--muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
}

.track-row.active .track-num { display: none; }

.eq-anim {
    display: none;
    width: 18px;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
    flex-shrink: 0;
    height: 16px;
}

.track-row.active .eq-anim { display: flex; }

.eq-b {
    width: 3px;
    background: var(--accent2);
    border-radius: 2px;
    animation: eqAnim .9s ease-in-out infinite alternate;
}
.eq-b:nth-child(1) { animation-delay: 0s;   height: 8px; }
.eq-b:nth-child(2) { animation-delay: .2s;  height: 14px; }
.eq-b:nth-child(3) { animation-delay: .4s;  height: 6px; }
.track-row.paused .eq-b { animation-play-state: paused; }

@keyframes eqAnim {
    from { height: 3px; }
    to   { height: 14px; }
}

.track-thumb {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
}

.track-row.active .track-thumb { box-shadow: 0 0 0 2px var(--accent); }

.track-meta { flex: 1; min-width: 0; }

.track-name-list {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
}

.track-row.active .track-name-list { color: var(--accent2); }

.track-artist-list {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.track-dur {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
}

.track-row.active .track-dur { color: var(--accent2); }

/* ════════════════════════════
   MAIN
════════════════════════════ */
.main {
    flex: 1;
    background: var(--sidebar);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    min-width: 0;
}

.main-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(80px) brightness(.2) saturate(1.5);
    opacity: 0;
    transition: opacity 1s ease;
    z-index: 0;
}
.main-bg.on { opacity: 1; }

.placeholder {
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    color: var(--muted);
    font-size: 14px;
}

.placeholder-icon {
    width: 72px;
    height: 72px;
    background: rgba(255,255,255,.05);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.placeholder-icon svg { width: 36px; height: 36px; fill: var(--muted); }

.main-inner {
    z-index: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    width: 100%;
}

.main-inner.on { display: flex; }
.placeholder.off { display: none; }

.now-cover {
    width: min(220px, 45vh);
    height: min(220px, 45vh);
    border-radius: 16px;
    object-fit: cover;
    box-shadow: 0 24px 64px rgba(0,0,0,.7);
    transition: transform .5s cubic-bezier(.34,1.56,.64,1);
    margin-bottom: 28px;
    flex-shrink: 0;
}

.now-cover.pop { transform: scale(1.04); }

.now-text { text-align: center; width: 100%; }

.now-title {
    font-size: clamp(16px, 2.5vw, 26px);
    font-weight: 800;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.now-artist {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
}

/* ════════════════════════════
   BOTTOM BAR
   grid: [left] [center] [right]
   left и right — одинаковой ширины,
   центр всегда строго по середине
════════════════════════════ */
.bar {
    height: var(--bar-h);
    background: #0d0d18;
    border-top: 1px solid var(--border);
    flex-shrink: 0;

    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
}

/* — Левая секция: инфо о треке — */
.bar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
}

.bar-thumb {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .3s;
}

.bar-thumb.on { opacity: 1; }

.bar-info { min-width: 0; }

.bar-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.bar-artist {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* — Центральная секция — */
.bar-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: clamp(280px, 40vw, 560px);
}

.controls {
    display: flex;
    align-items: center;
    gap: 6px;
}

.ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: transform .15s, opacity .2s;
    position: relative;
    flex-shrink: 0;
}

.ctrl-btn:hover  { transform: scale(1.1); }
.ctrl-btn:active { transform: scale(.92); }

.btn-skip {
    width: 34px;
    height: 34px;
    opacity: .7;
}
.btn-skip:hover { opacity: 1; }
.btn-skip svg { width: 22px; height: 22px; fill: var(--text); }

.btn-seek {
    width: 34px;
    height: 34px;
    opacity: .7;
}
.btn-seek:hover { opacity: 1; }
.btn-seek svg { width: 19px; height: 19px; fill: var(--text); }
.btn-seek .seek-label {
    position: absolute;
    font-size: 7px;
    font-weight: 800;
    color: var(--text);
    bottom: 4px;
}

.btn-play {
    width: 40px;
    height: 40px;
    background: var(--text) !important;
    border-radius: 50%;
    margin: 0 6px;
    opacity: 1 !important;
}
.btn-play:hover { background: #ddd !important; transform: scale(1.06); }
.btn-play svg { width: 18px; height: 18px; fill: #000; }

/* Прогресс-бар */
.progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
}

.time-label {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    width: 34px;
    line-height: 1;
}
.time-label.right { text-align: right; }

.prog-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,.12);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: height .15s;
}
.prog-track:hover { height: 6px; }

.prog-fill {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 10px;
    pointer-events: none;
    transition: width .1s linear;
    position: relative;
}
.prog-track:hover .prog-fill { background: var(--accent2); }

.prog-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    transition: transform .15s;
}
.prog-track:hover .prog-fill::after { transform: translateY(-50%) scale(1); }

/* — Правая секция: громкость — */
.bar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
}

.bar-right svg { width: 18px; height: 18px; fill: var(--muted); flex-shrink: 0; }

.vol-slider {
    -webkit-appearance: none;
    width: 90px;
    height: 4px;
    background: rgba(255,255,255,.15);
    border-radius: 10px;
    outline: none;
    cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
}
.vol-slider:hover::-webkit-slider-thumb { background: var(--accent2); }

/* ════════════════════════════
   MOBILE TOGGLE
════════════════════════════ */
.mob-toggle {
    display: none;
    position: fixed;
    bottom: calc(var(--bar-h) + 14px);
    right: 16px;
    z-index: 100;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    width: 46px;
    height: 46px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(139,92,246,.5);
    align-items: center;
    justify-content: center;
}
.mob-toggle svg { width: 22px; height: 22px; fill: #fff; }

/* ════════════════════════════
   MOBILE DRAWER
════════════════════════════ */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
}
.sidebar-overlay.open { display: block; }

.sidebar-drawer {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: min(300px, 85vw);
    background: var(--sidebar);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(-100%);
    transition: transform .3s ease;
}
.sidebar-overlay.open .sidebar-drawer { transform: translateX(0); }

.drawer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.drawer-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    border-radius: 6px;
    padding: 4px;
}
.drawer-close:hover { color: var(--text); }
.drawer-close svg { width: 20px; height: 20px; fill: currentColor; }

/* ════════════════════════════
   RESPONSIVE
════════════════════════════ */

/* Планшет */
@media (max-width: 900px) {
    .sidebar { width: 240px; min-width: 240px; }
    .bar-center { width: clamp(240px, 50vw, 460px); }
}

/* Мобилка */
@media (max-width: 680px) {

    /* Убираем десктопный сайдбар */
    .sidebar { display: none; }
    .mob-toggle { display: flex; }
    .layout { padding: 8px 8px 0; }

    /* Бар: только центр, без левой и правой секций */
    .bar {
        grid-template-columns: 1fr;
        justify-items: center;
        padding: 0 16px;
        height: auto;
        padding-top: 12px;
        padding-bottom: 12px;
        gap: 10px;
    }

    .bar-left  { display: none; }
    .bar-right { display: none; }

    /* Центральная секция на всю ширину */
    .bar-center {
        width: 100%;
        max-width: 100%;
        gap: 10px;
    }

    /* Прогресс на всю ширину */
    .progress-row { width: 100%; }

    /* Кнопки чуть крупнее для пальцев */
    .btn-play  { width: 46px; height: 46px; }
    .btn-play svg { width: 20px; height: 20px; }
    .btn-skip  { width: 38px; height: 38px; }
    .btn-seek  { width: 38px; height: 38px; }
    .controls  { gap: 10px; }

    /* Убираем обложку из главной зоны — только название */
    .now-title { font-size: 16px; }
    .main-inner { padding: 20px 16px; }
}

@media (max-width: 360px) {
    .btn-seek { display: none; }
}
</style>

</div>

<!-- Кнопка плейлиста на мобилке -->
<button class="mob-toggle" id="mobToggle" title="Плейлист">

        <div class="track-list" id="trackListMob"></div>

</div>

    {
        src:    "https://huggingface.co/Politrees/MuXolotl_resources/resolve/main/site/images/fun/Deputat_26_Rayona/audio/song7.mp3",
        title:  "Я ДЕПУТАТ",
        artist: "Депутат 26 Района",
        cover:  "https://huggingface.co/Politrees/MuXolotl_resources/resolve/main/site/images/fun/Deputat_26_Rayona/images/cover.webp"
    },
];

const audio = new Audio();
audio.volume = 0.8;

const $ = id => document.getElementById(id);

const els = {
    playBtn:    $('playBtn'),
    iconPlay:   $('iconPlay'),
    iconPause:  $('iconPause'),
    progFill:   $('progFill'),
    progTrack:  $('progTrack'),
    curTime:    $('curTime'),
    durTime:    $('durTime'),
    nowCover:   $('nowCover'),
    nowTitle:   $('nowTitle'),
    nowArtist:  $('nowArtist'),
    barThumb:   $('barThumb'),
    barName:    $('barName'),
    barArtist:  $('barArtist'),
    mainBg:     $('mainBg'),
    placeholder:$('placeholder'),
    mainInner:  $('mainInner'),
    trackList:  $('trackList'),
    trackListMob:$('trackListMob'),
    trackCount: $('trackCount'),
    volSlider:  $('volSlider'),
    mobToggle:  $('mobToggle'),
    overlay:    $('sidebarOverlay'),
    drawerClose:$('drawerClose'),
};

let idx     = -1;
let playing = false;

/* ── Рендер строки трека ── */
function makeRow(t, i, container) {
    const row = document.createElement('div');
    row.className = 'track-row';
    row.dataset.index = i;
    row.innerHTML = `
        <span class="track-num">${i + 1}</span>
        <div class="eq-anim">
            <div class="eq-b"></div>
            <div class="eq-b"></div>
            <div class="eq-b"></div>
        </div>
        <img class="track-thumb" src="${t.cover}" alt="">
        <div class="track-meta">
            <div class="track-name-list">${t.title}</div>
            <div class="track-artist-list">${t.artist}</div>
        </div>
        <span class="track-dur" id="${container.id}-dur-${i}">—</span>`;
    row.addEventListener('click', () => { selectTrack(i, true); closeDrawer(); });
    container.appendChild(row);
}

function renderLists() {
    els.trackCount.textContent = `${tracks.length} треков`;
    tracks.forEach((t, i) => {
        makeRow(t, i, els.trackList);
        makeRow(t, i, els.trackListMob);
    });

    /* Подгружаем длительности в фоне */
    tracks.forEach((t, i) => {
        const tmp = new Audio();
        tmp.src = t.src;
        tmp.addEventListener('loadedmetadata', () => {
            ['trackList','trackListMob'].forEach(lid => {
                const el = $(`${lid}-dur-${i}`);
                if (el) el.textContent = fmt(tmp.duration);
            });
        });
    });
}

/* ── Выбор трека ── */
function selectTrack(i, play = false) {
    allRows('remove', 'active');
    allRows('remove', 'paused');

    idx = i;
    const t = tracks[i];

    audio.src = t.src;

    els.nowCover.src          = t.cover;
    els.nowTitle.textContent  = t.title;
    els.nowArtist.textContent = t.artist;
    els.mainBg.style.backgroundImage = `url(${t.cover})`;
    els.mainBg.classList.add('on');
    els.placeholder.classList.add('off');
    els.mainInner.classList.add('on');

    els.nowCover.classList.add('pop');
    setTimeout(() => els.nowCover.classList.remove('pop'), 500);

    els.barThumb.src          = t.cover;
    els.barThumb.classList.add('on');
    els.barName.textContent   = t.title;
    els.barArtist.textContent = t.artist;

    [els.trackList, els.trackListMob].forEach(list => {
        const row = list.querySelector(`[data-index="${i}"]`);
        if (row) { row.classList.add('active'); row.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
    });

    if (play) { audio.play().catch(()=>{}); setPlaying(true); }
    else setPlaying(false);
}

/* ── Состояние воспроизведения ── */
function setPlaying(state) {
    playing = state;
    els.iconPlay.style.display  = state ? 'none'  : 'block';
    els.iconPause.style.display = state ? 'block' : 'none';
    [els.trackList, els.trackListMob].forEach(list => {
        const row = list.querySelector(`[data-index="${idx}"]`);
        if (row) state ? row.classList.remove('paused') : row.classList.add('paused');
    });
}

function allRows(action, cls) {
    document.querySelectorAll('.track-row').forEach(r => r.classList[action](cls));
}

/* ── Play/Pause ── */
els.playBtn.addEventListener('click', () => {
    if (idx === -1) return;
    if (audio.paused) { audio.play(); setPlaying(true); }
    else              { audio.pause(); setPlaying(false); }
});

/* ── Прогресс ── */
audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    els.progFill.style.width  = (audio.currentTime / audio.duration * 100) + '%';
    els.curTime.textContent   = fmt(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
    els.durTime.textContent = fmt(audio.duration);
});

els.progTrack.addEventListener('click', e => {
    if (!audio.duration) return;
    const r = els.progTrack.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

/* ── Перемотка / Пред / След ── */
$('seekBackBtn').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 5); });
$('seekFwdBtn').addEventListener('click',  () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 5); });
$('prevBtn').addEventListener('click', () => { if (idx > 0) selectTrack(idx - 1, playing); });
$('nextBtn').addEventListener('click', () => { if (idx < tracks.length - 1) selectTrack(idx + 1, playing); });

audio.addEventListener('ended', () => {
    if (idx < tracks.length - 1) selectTrack(idx + 1, true);
    else setPlaying(false);
});

/* ── Громкость ── */
els.volSlider.addEventListener('input', e => { audio.volume = e.target.value; });

/* ── Drawer ── */
els.mobToggle.addEventListener('click', () => els.overlay.classList.add('open'));
els.drawerClose.addEventListener('click', closeDrawer);
els.overlay.addEventListener('click', e => { if (e.target === els.overlay) closeDrawer(); });
function closeDrawer() { els.overlay.classList.remove('open'); }

/* ── Утилита ── */
function fmt(sec) {
    if (isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
}

renderLists();
</script>
</body>
</html>
